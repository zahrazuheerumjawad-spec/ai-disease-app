<style>

      <div class="progress"><div class="bar" id="bar"></div></div>
      <div class="question">
        <div class="meta" id="meta"></div>
        <div id="questionText"></div>
      </div>
      <div class="options" id="options"></div>
      <div class="feedback" id="feedback"></div>
      <div class="controls">
        <button class="btn ghost" onclick="prevQuestion()">Previous</button>
        <button class="btn green" onclick="nextQuestion()">Next</button>
        <button class="btn yellow" onclick="finishGame()">Finish</button>
      </div>
    </div>

    <div id="end" class="end" style="display:none;">
      <h1>Great job, Saroona! 🎉</h1>
      <div class="big" id="finalScore"></div>
      <p id="finalMessage"></p>
      <button class="btn yellow" onclick="location.reload()">Play Again</button>

    </div>
  </div>
</div>

: "تغير السرعة"}, "answer": "ب", "id": 155}, {"question": "الإزاحة هي:", "options": {"أ": "طول المسار", "ب": "التغير من الموقع الابتدائي إلى النهائي مع الاتجاه", "ج": "السرعة على الزمن", "د": "المساحة تحت المنحنى فقط"}, "answer": "ب", "id": 156}, {"question": "إذا كان منحنى الموقع-الزمن خطا مستقيما مائلا فهذا يدل على:", "options": {"أ": "سرعة ثابتة", "ب": "تسارع متغير", "ج": "جسم ساكن", "د": "سرعة صفر"}, "answer": "أ", "id": 157}, {"question": "إذا كان منحنى السرعة-الزمن خطا مائلا للأعلى فهذا يدل على:", "options": {"أ": "تسارع موجب", "ب": "تسارع سالب", "ج": "تسارع صفر", "د": "سكون"}, "answer": "أ", "id": 158}, {"question": "إذا كان منحنى السرعة-الزمن خطا مائلا للأسفل فهذا يدل على:", "options": {"أ": "تسارع موجب", "ب": "تسارع سالب", "ج": "سرعة ثابتة", "د": "زمن ثابت"}, "answer": "ب", "id": 159}, {"question": "السرعة السالبة تعني:", "options": {"أ": "الجسم أبطأ فقط", "ب": "الحركة عكس الاتجاه الموجب", "ج": "الجسم ساكن", "د": "التسارع صفر"}, "answer": "ب", "id": 160}, {"question": "إذا كانت السرعة صفرا والتسارع غير صفر فهذا يعني أن الجسم قد:", "options": {"أ": "يبقى ساكنا دائما", "ب": "يبدأ بالحركة أو يغير اتجاهه", "ج": "لا يتحرك أبدا", "د": "لا يمتلك قوة"}, "answer": "ب", "id": 161}];
document.getElementById("totalBank").textContent = bank.length;

let questions = [];
let index = 0;
let score = 0;
let correct = 0;
let wrong = 0;
let answers = {};
let locked = {};

function shuffleArray(arr) {
  return arr.map(x => [Math.random(), x]).sort((a,b)=>a[0]-b[0]).map(x=>x[1]);
}

function startGame() {
  const count = document.getElementById("count").value;
  const doShuffle = document.getElementById("shuffle").checked;
  questions = [...bank];
  if (doShuffle) questions = shuffleArray(questions);
  if (count !== "all") questions = questions.slice(0, Number(count));
  index = 0; score = 0; correct = 0; wrong = 0; answers = {}; locked = {};
  document.getElementById("start").style.display = "none";
  document.getElementById("quiz").style.display = "block";
  document.getElementById("qTotal").textContent = questions.length;
  render();
}

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]));
}

function render() {
  const q = questions[index];
  document.getElementById("qNo").textContent = index + 1;
  document.getElementById("score").textContent = score;
  document.getElementById("correctCount").textContent = correct;
  document.getElementById("wrongCount").textContent = wrong;
  document.getElementById("bar").style.width = ((index + 1) / questions.length * 100) + "%";
  document.getElementById("meta").textContent = q.page ? ("Page " + q.page + " | Original question " + q.original_no) : "";
  document.getElementById("questionText").textContent = q.question;

  const box = document.getElementById("options");
  box.innerHTML = "";
  Object.entries(q.options).forEach(([letter, text]) => {
    const btn = document.createElement("button");
    btn.className = "option";
    btn.innerHTML = "<b>" + letter + "</b> - " + escapeHtml(text);
    btn.onclick = () => choose(letter);
    if (locked[index]) {
      btn.classList.add("disabled");
      if (letter === q.answer) btn.classList.add("correct");
      if (answers[index] === letter && letter !== q.answer) btn.classList.add("wrong");
    }
    box.appendChild(btn);
  });

  const fb = document.getElementById("feedback");
  if (!locked[index]) {
    fb.innerHTML = "";
  } else {
    const chosen = answers[index];
    if (chosen === q.answer) {
      fb.innerHTML = "<span class='correctText'>Correct ✅</span><br>Correct answer: " + q.answer + " - " + escapeHtml(q.options[q.answer]);
    } else {
      fb.innerHTML = "<span class='wrongText'>Wrong ❌</span><br>Correct answer: " + q.answer + " - " + escapeHtml(q.options[q.answer]);
    }
  }
}

function choose(letter) {
  if (locked[index]) return;
  const q = questions[index];
  answers[index] = letter;
  locked[index] = true;
  if (letter === q.answer) {
    score++;
    correct++;
  } else {
    wrong++;
  }
  render();
}

function nextQuestion() {
  if (index < questions.length - 1) {
    index++;
    render();
  } else {
    finishGame();
  }
}

function prevQuestion() {
  if (index > 0) {
    index--;
    render();
  }
}

function finishGame() {
  document.getElementById("quiz").style.display = "none";
  document.getElementById("end").style.display = "block";
  const percent = Math.round((score / questions.length) * 100);
  document.getElementById("finalScore").textContent = score + " / " + questions.length;
  document.getElementById("finalMessage").textContent = "Your score is " + percent + "%";

  let html = "<h3>Review Answers</h3>";
  questions.forEach((q, i) => {
    const chosen = answers[i] || "Not answered";
    const isOk = chosen === q.answer;
    html += "<div class='reviewItem'>" +
      "<b>" + (i+1) + ". " + escapeHtml(q.question) + "</b><br>" +
      "Your answer: " + escapeHtml(chosen) + (q.options[chosen] ? " - " + escapeHtml(q.options[chosen]) : "") + "<br>" +
      "Correct answer: <span class='correctText'>" + q.answer + " - " + escapeHtml(q.options[q.answer]) + "</span>" +
      (isOk ? " ✅" : " ❌") +
      "</div>";
  });
  document.getElementById("review").innerHTML = html;
}
</script>
