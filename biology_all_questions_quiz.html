  :root {

    --card:#ffffff;
    --text:#172033;
  }
  * { box-sizing:border-box; }
  body {
    font-family: Arial, Tahoma, sans-serif;
    background:var(--bg);
    margin:0;
    padding:0;
    color:var(--text);
  }
  .container {
    max-width:850px;
    margin:28px auto;
    background:var(--card);
    padding:26px;
    border-radius:22px;
    box-shadow:0 8px 24px rgba(0,0,0,.12);
  }
  h1 { margin-top:0; color:#1e3a8a; font-size:28px; }
  .progressBar {
    height:12px;
    background:#e5e7eb;
    border-radius:999px;
    overflow:hidden;
    margin:16px 0 8px;
  }
  .progressFill {
    height:100%;
    width:0%;
    background:var(--primary);
    transition:.25s;
  }
  .meta {
    display:flex;
    justify-content:space-between;
    gap:10px;
    color:#64748b;
    font-size:15px;
    margin-bottom:18px;
  }
  .question {
    font-size:24px;
    font-weight:700;
    line-height:1.6;
    margin:20px 0;
  }
  .option {
    display:block;
    width:100%;
    text-align:right;
    background:#f1f5f9;
    padding:15px 16px;
    margin:11px 0;
    border-radius:14px;
    cursor:pointer;
    border:2px solid transparent;
    font-size:19px;
    transition:.15s;
  }
  .option:hover { background:#e2e8f0; }
  .correct { background:#dcfce7 !important; border-color:#22c55e !important; }
  .wrong { background:#fee2e2 !important; border-color:#ef4444 !important; }
  .disabled { pointer-events:none; opacity:.92; }
  #feedback {
    font-size:21px;
    font-weight:bold;
    margin-top:18px;
    min-height:34px;
  }
  .buttons {
    display:flex;
    gap:10px;
    flex-wrap:wrap;
    margin-top:20px;
  }
  button {
    background:var(--primary);
    color:white;
    border:none;
    padding:12px 22px;
    border-radius:12px;
    font-size:18px;
    cursor:pointer;
  }
  button.secondary { background:#475569; }
  button.danger { background:#dc2626; }
  button:disabled { background:#94a3b8; cursor:not-allowed; }
  .score {
    font-size:30px;
    color:var(--green);
    font-weight:bold;
  }
  .review {
    margin-top:20px;
    max-height:420px;
    overflow:auto;
    border-top:1px solid #e5e7eb;
    padding-top:16px;
  }
  .reviewItem {
    padding:12px;
    border-radius:12px;
    background:#f8fafc;
    margin-bottom:10px;
  }
  .small { color:#64748b; font-size:14px; }
</style>

let current = 0;
let score = 0;
let answered = false;
let userAnswers = [];

const quiz = document.getElementById("quiz");

function showQuestion(){
  answered = false;
  const item = questions[current];
  const percent = Math.round((current / questions.length) * 100);

  quiz.innerHTML = `
    <div class="progressBar"><div class="progressFill" style="width:${percent}%"></div></div>
    <div class="meta">
      <span>السؤال ${current + 1} من ${questions.length}</span>
      <span>الدرجة الحالية: ${score}</span>
    </div>
    <div class="question">${item.q}</div>
    <div id="options"></div>
    <div id="feedback"></div>
    <div class="buttons">
      <button id="nextBtn" onclick="nextQuestion()" disabled>
        ${current === questions.length - 1 ? "عرض النتيجة" : "التالي"}
      </button>
      <button class="secondary" onclick="skipQuestion()">تخطي</button>
      <button class="danger" onclick="restartQuiz()">إعادة من البداية</button>
    </div>
  `;

  const optionsDiv = document.getElementById("options");
  item.o.forEach((opt, idx) => {
    const div = document.createElement("button");
    div.type = "button";
    div.className = "option";
    div.textContent = opt;
    div.onclick = () => checkAnswer(div, opt);
    optionsDiv.appendChild(div);
  });
}

function checkAnswer(selectedDiv, selected){
  if(answered) return;
  answered = true;

  const item = questions[current];
  const allOptions = document.querySelectorAll(".option");

  allOptions.forEach(optDiv => {
    optDiv.classList.add("disabled");
    if(optDiv.textContent === item.a){
      optDiv.classList.add("correct");
    }
  });

  const correct = selected === item.a;
  if(correct){
    score++;
    document.getElementById("feedback").innerHTML = "✅ صح!";
    document.getElementById("feedback").style.color = "green";
  } else {
    selectedDiv.classList.add("wrong");
    document.getElementById("feedback").innerHTML = `❌ خطأ — الإجابة الصحيحة: ${item.a}`;
    document.getElementById("feedback").style.color = "red";
  }

  userAnswers[current] = {selected, correct};
  document.getElementById("nextBtn").disabled = false;
}

function skipQuestion(){
  if(!answered){
    userAnswers[current] = {selected:"لم تتم الإجابة", correct:false};
  }
  nextQuestion();
}

function nextQuestion(){
  current++;
  if(current < questions.length){
    showQuestion();
  } else {
    showResult();
  }
}

function showResult(){
  const percent = Math.round((score / questions.length) * 100);
  let msg = "ممتازة جدًا 🌟";
  if(percent < 50) msg = "تحتاجين مراجعة أكثر";
  else if(percent < 70) msg = "جيد، راجعي الأخطاء";
  else if(percent < 90) msg = "ممتاز، باقي تثبيت بسيط";

  let reviewHTML = "";
  questions.forEach((q, i) => {
    const ua = userAnswers[i] || {selected:"لم تتم الإجابة", correct:false};
    reviewHTML += `
      <div class="reviewItem">
        <b>${i+1}. ${q.q}</b><br>
        <span class="small">إجابتك: ${ua.selected}</span><br>
        <span class="small">الصحيح: ${q.a}</span><br>
        <span style="color:${ua.correct ? 'green':'red'}">${ua.correct ? '✅ صحيح':'❌ خطأ'}</span>
      </div>
    `;
  });

  quiz.innerHTML = `
    <div class="progressBar"><div class="progressFill" style="width:100%"></div></div>
    <h2>انتهى الاختبار 🎉</h2>
    <p class="score">درجتك: ${score} / ${questions.length}</p>
    <p class="score">النسبة: ${percent}%</p>
    <p style="font-size:22px;font-weight:bold">${msg}</p>
    <div class="buttons">
      <button onclick="restartQuiz()">إعادة الاختبار</button>
      <button class="secondary" onclick="window.print()">طباعة النتيجة</button>
    </div>
    <div class="review">
      <h3>مراجعة الإجابات</h3>
      ${reviewHTML}
    </div>
  `;
}

function restartQuiz(){
  current = 0;
  score = 0;
  answered = false;
  userAnswers = [];
  showQuestion();
}

showQuestion();
